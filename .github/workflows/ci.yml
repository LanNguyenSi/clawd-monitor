name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          ADMIN_PASSWORD: ci-test
          JWT_SECRET: ci-test-secret-32-chars-minimum-ok
          NEXT_PUBLIC_DEFAULT_GATEWAY_URL: http://localhost:18789
