services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - CLAWD_MONITOR_DATA_DIR=/data
    volumes:
      - clawd_monitor_data:/data
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clawd-monitor.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.clawd-monitor.entrypoints=websecure"
      - "traefik.http.routers.clawd-monitor.tls=true"
      - "traefik.http.routers.clawd-monitor.tls.certresolver=letsencrypt"
      - "traefik.http.services.clawd-monitor.loadbalancer.server.port=3000"
    networks:
      - traefik

networks:
  traefik:
    external: true

volumes:
  clawd_monitor_data:
